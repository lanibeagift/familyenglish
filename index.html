<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Loving English Garden - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --beige:#F5F0E8;--beige2:#EDE6D6;--warm:#D4C5A9;--wood:#8B6F4E;--green:#5C8A5E;
      --drop:#4A90D9;--drop-light:#A8D4F5;--text:#3D2B1F;--text-soft:#9B7E6F;--card-r:16px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    
    /* BẢO MẬT: CHỐNG BÔI ĐEN VĂN BẢN */
    body{
      font-family:'Nunito',sans-serif;background:var(--beige);color:var(--text);min-height:100vh;
      -webkit-user-select: none; /* Safari */
      -ms-user-select: none; /* IE 10 and IE 11 */
      user-select: none; /* Standard syntax */
    }

    /* ĐIỀU CHỈNH KÍCH THƯỚC CƠ BẢN (CHO MOBILE) */
    .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(245,240,232,0.97);border-bottom:1px solid var(--warm);position:sticky;top:0;z-index:99}
    .logo{font-family:'Lora',serif;font-size:20px;color:var(--wood);font-weight:600;cursor:pointer}
    .logo span{color:var(--green)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .drops-pill{display:flex;align-items:center;gap:6px;background:var(--drop-light);border:1px solid var(--drop);border-radius:20px;padding:5px 12px;font-size:15px;font-weight:700;color:var(--drop)}
    
    .home-wrap{padding:24px 20px 60px;max-width:900px;margin:0 auto}
    .home-hero{text-align:center;padding:28px 0 24px}
    .hero-plant{font-size:64px;margin-bottom:10px}
    .hero-title{font-family:'Lora',serif;font-size:28px;color:var(--wood);font-weight:600;margin-bottom:8px}
    .hero-sub{font-size:16px;color:var(--text-soft)}
    
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
    .stat-box{background:#fff;border:1px solid var(--beige2);border-radius:var(--card-r);padding:16px 12px;text-align:center}
    .stat-num{font-size:24px;font-weight:800;color:var(--wood)}
    .stat-lbl{font-size:12px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
    
    .section-lbl{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-soft);margin-bottom:16px}
    
    .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .t-card{background:#fff;border:1px solid var(--beige2);border-radius:var(--card-r);overflow:hidden;cursor:pointer;transition:all .18s;text-decoration:none;color:inherit;display:block;}
    .t-card:hover{border-color:var(--warm);transform:translateY(-2px)}
    .t-card.t-active{border:2px solid var(--drop)}
    .t-card.t-locked{opacity:.65;cursor:default;pointer-events:none;}
    .t-thumb{height:100px;display:flex;align-items:center;justify-content:center;position:relative}
    .t-emoji{font-size: 44px;}
    .t-num{position:absolute;top:10px;left:10px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.9);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--text)}
    .t-stars{position:absolute;bottom:8px;right:10px;display:flex;gap:2px}
    .t-star{width:12px;height:12px}
    
    .t-body{padding:14px}
    .t-vn{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4}
    .t-en{font-size:14px;color:var(--text-soft);font-style:italic;margin-bottom:10px;line-height:1.4}
    .t-badge{display:inline-block;font-size:12px;font-weight:700;border-radius:20px;padding:4px 10px;margin-bottom:10px}
    .b-done{background:#EAF3DE;color:#27500A}.b-active{background:#E6F1FB;color:#0C447C}.b-locked{background:#F1EFE8;color:#5F5E5A}
    
    .t-progress-info {font-size:13px;color:var(--text-soft);}
    .t-progress-pct {font-size:13px;font-weight:700;color:var(--text-soft);}
    .t-bar-wrap{height:6px;background:var(--beige2);border-radius:4px;overflow:hidden;margin-top:6px;}
    .t-bar-fill{height:100%;border-radius:4px;transition:width .4s}

    /* GIAO DIỆN ĐĂNG NHẬP */
    .login-overlay{position:fixed;inset:0;background:var(--beige);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.4s}
    .login-box{background:#fff;padding:40px 28px;border-radius:24px;box-shadow:0 10px 40px rgba(139,111,78,0.15);text-align:center;max-width:400px;width:90%;border:1px solid var(--beige2)}
    .login-plant{font-size:56px; margin-bottom:12px}
    .login-title{font-family:'Lora', serif; color:var(--wood); margin-bottom: 28px; font-size:26px}
    .login-input{width:100%;padding:16px;margin:10px 0;border:1.5px solid var(--beige2);border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;outline:none;transition:border 0.2s; -webkit-user-select: text; user-select: text;}
    .login-input:focus{border-color:var(--green)}
    .login-btn{width:100%;background:var(--green);color:#fff;border:none;padding:16px;border-radius:14px;font-weight:700;font-size:18px;cursor:pointer;margin-top:16px;font-family:'Nunito',sans-serif;transition:background 0.2s}
    .login-btn:hover{background:var(--green-light)}
    .error-msg{color:#E24B4A;font-size:15px;font-weight:600;display:none;margin-top:10px;animation:shake 0.3s}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

    /* KÍCH THƯỚC CHỮ SIÊU TO CHO LAPTOP / MÀN HÌNH RỘNG */
    @media (min-width: 1024px) {
      .home-wrap{max-width:1100px; padding:40px 20px;}
      .nav{padding: 20px 40px;}
      .logo{font-size:32px;}
      .drops-pill{font-size:18px; padding:8px 18px;}
      
      .hero-plant{font-size:80px;}
      .hero-title{font-size:46px; margin-bottom: 12px;}
      .hero-sub{font-size:22px;}
      
      .stat-box{padding: 24px;}
      .stat-num{font-size:44px;}
      .stat-lbl{font-size:16px; font-weight: 700; margin-top: 8px;}
      
      .section-lbl{font-size:24px; margin-bottom:24px; margin-top:16px;}
      
      /* Grid bài học to rộng rãi hơn */
      .topic-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:24px;}
      .t-thumb{height: 140px;}
      .t-emoji{font-size: 64px;}
      .t-num{width: 34px; height: 34px; font-size: 18px; top: 14px; left: 14px;}
      .t-star{width: 16px; height: 16px;}
      
      .t-body{padding: 20px;}
      .t-vn{font-size:24px; margin-bottom: 6px;}
      .t-en{font-size:18px; margin-bottom: 14px;}
      .t-badge{font-size:15px; padding: 6px 14px; margin-bottom: 14px;}
      
      .t-progress-info {font-size:16px;}
      .t-progress-pct {font-size:16px;}
      .t-bar-wrap{height:8px; margin-top:8px;}

      /* Form đăng nhập cho laptop */
      .login-box{max-width: 500px; padding: 50px 40px;}
      .login-plant{font-size: 70px;}
      .login-title{font-size: 34px;}
      .login-input{font-size: 18px; padding: 20px;}
      .login-btn{font-size: 20px; padding: 20px;}
    }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-plant">🌱</div>
    <h2 class="login-title">Loving English Garden</h2>
    
    <input type="text" id="username" class="login-input" placeholder="Tên đăng nhập" autocomplete="off">
    <input type="password" id="password" class="login-input" placeholder="Mật khẩu">
    
    <div class="error-msg" id="loginError">Tên đăng nhập hoặc mật khẩu chưa đúng!</div>
    
    <button class="login-btn" onclick="checkLogin()">Vào Vườn 🌿</button>
  </div>
</div>

<div class="nav">
  <div class="logo">🌱 Loving English <span>Garden</span></div>
  <div class="nav-right">
    <div class="drops-pill">💧 <span id="navDrops">0</span></div>
  </div>
</div>

<div class="home-wrap">
  <div class="home-hero">
    <div class="hero-plant" id="heroPlant">🌱</div>
    <div class="hero-title">Vườn Tiếng Anh</div>
    <div class="hero-sub">100 ngày · 10 chủ đề · Cả gia đình cùng học</div>
  </div>
  
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="sDays">0</div><div class="stat-lbl">Ngày xong</div></div>
    <div class="stat-box"><div class="stat-num" id="sDrops">0</div><div class="stat-lbl">Giọt nước 💧</div></div>
    <div class="stat-box"><div class="stat-num" id="sStreak">1</div><div class="stat-lbl">Chuỗi 🔥</div></div>
    <div class="stat-box"><div class="stat-num" id="sPct" style="color:#639922">0%</div><div class="stat-lbl">Tiến độ</div></div>
  </div>
  
  <div class="section-lbl">Lộ Trình 100 Ngày</div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<script>
// --- CHỨC NĂNG BẢO MẬT ---
document.addEventListener('contextmenu', event => event.preventDefault());
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
    e.preventDefault();
  }
});
document.addEventListener('copy', event => event.preventDefault());

// --- CHỨC NĂNG ĐĂNG NHẬP ---
function checkLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const err = document.getElementById('loginError');
  
  if (u === 'weloveenglish' && p === 'beagift') {
    sessionStorage.setItem('isLoggedIn', 'true');
    err.style.display = 'none';
    const overlay = document.getElementById('loginOverlay');
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 400);
  } else {
    err.style.display = 'block';
  }
}

document.getElementById('password').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') checkLogin();
});
document.getElementById('username').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

window.onload = function() {
  if(sessionStorage.getItem('isLoggedIn') === 'true') {
    document.getElementById('loginOverlay').style.display = 'none';
  }
}

// --- DATA VÀ HIỂN THỊ DASHBOARD ---
const TOPICS = [
  {id:1,emoji:"👋",vn:"Chào nhau buổi sáng",en:"Good morning routines",color:"#EF9F27",days:"1–10",progress:0,stars:0,status:"active"},
  {id:2,emoji:"🪥",vn:"Vệ sinh cá nhân, răng miệng",en:"Personal hygiene & teeth",color:"#5DCAA5",days:"11–20",progress:0,stars:0,status:"locked"},
  {id:3,emoji:"👗",vn:"Quần áo, lên đồ",en:"Getting dressed",color:"#ED93B1",days:"21–30",progress:0,stars:0,status:"locked"},
  {id:4,emoji:"🍽️",vn:"Trên bàn ăn",en:"At the dining table",color:"#85B7EB",days:"31–40",progress:0,stars:0,status:"locked"},
  {id:5,emoji:"🧼",vn:"Rửa tay, vệ sinh",en:"Washing hands & hygiene",color:"#97C459",days:"41–50",progress:0,stars:0,status:"locked"},
  {id:6,emoji:"🛝",vn:"Công viên, sân chơi",en:"Park & Playground",color:"#F0997B",days:"51–60",progress:0,stars:0,status:"locked"},
  {id:7,emoji:"🧸",vn:"Dọn dẹp đồ chơi",en:"Tidying up toys",color:"#9FE1CB",days:"61–70",progress:0,stars:0,status:"locked"},
  {id:8,emoji:"🛁",vn:"Tắm rửa",en:"Bath time",color:"#AFA9EC",days:"71–80",progress:0,stars:0,status:"locked"},
  {id:9,emoji:"📖",vn:"Truyện trước giờ đi ngủ",en:"Bedtime stories",color:"#85B7EB",days:"81–90",progress:0,stars:0,status:"locked"},
  {id:10,emoji:"🌙",vn:"Chúc ngủ ngon",en:"Good night",color:"#D4537E",days:"91–100",progress:0,stars:0,status:"locked"},
];

function starsHTML(n,t=5){
  return Array.from({length:t},(_,i)=>`<svg class="t-star" viewBox="0 0 10 10"><path d="M5 1l1.2 2.5L9 4l-2 1.9.5 2.7L5 7.3 2.5 8.6 3 5.9 1 4l2.8-.5z" fill="${i<n?'#F59E0B':'#D3D1C7'}"/></svg>`).join('');
}

function renderHome(){
  const savedDrops = localStorage.getItem('gardenDrops') || 0;
  const savedDays = JSON.parse(localStorage.getItem('gardenDays') || '[]');
  document.getElementById('sDays').textContent = savedDays.length;
  document.getElementById('sDrops').textContent = savedDrops;
  document.getElementById('navDrops').textContent = savedDrops;

  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const locked = t.status==='locked';
    const a = document.createElement('a');
    a.href = locked ? '#' : `topic${t.id}.html`; 
    a.className = 't-card'+(t.status==='active'?' t-active':'')+(locked?' t-locked':'');
    
    const bCls = t.status==='done'?'b-done':t.status==='active'?'b-active':'b-locked';
    const bTxt = t.status==='done'?'Hoàn thành':t.status==='active'?'Đang học':'Chưa mở';
    const barC = t.status==='done'?'#639922':t.status==='active'?'#378ADD':'#B4B2A9';
    
    a.innerHTML = `
      <div class="t-thumb" style="background:${t.color}22">
        <span class="t-emoji">${t.emoji}</span>
        <div class="t-num">${t.id}</div>
        <div class="t-stars">${starsHTML(t.stars)}</div>
      </div>
      <div class="t-body">
        <div class="t-vn">${t.vn}</div>
        <div class="t-en">${t.en}</div>
        <span class="t-badge ${bCls}">${bTxt}</span>
        <div style="margin-top:auto">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="t-progress-info">Ngày ${t.days}</span>
            <span class="t-progress-pct">${t.progress}%</span>
          </div>
          <div class="t-bar-wrap"><div class="t-bar-fill" style="width:${t.progress}%;background:${barC}"></div></div>
        </div>
      </div>`;
    grid.appendChild(a);
  });
}

renderHome();
</script>
</body>
</html>
